name: ZPE Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build (deploy mode)
        run: npm run deploy

      - name: Push to zpe-projekty GitHub
        env:
          ZPE_USER: ${{ secrets.ZPE_USER_NAME }}
          ZPE_PASS: ${{ secrets.ZPE_PASS }}
        run: |
          echo "ZPE_USER length: ${#ZPE_USER}"
          echo "ZPE_PASS length: ${#ZPE_PASS}"
          ZPE_USER_ENC=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['ZPE_USER'],safe=''))")
          ZPE_PASS_ENC=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['ZPE_PASS'],safe=''))")
          git config user.email "ci@zpe-deploy"
          git config user.name "ZPE CI"
          git add -f entry.js images/ engine.json scenario.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git remote add zpe "https://${ZPE_USER_ENC}:${ZPE_PASS_ENC}@github.com/zpe-projekty/IX_3_TEST_Kosmiczne_Uklady.git"
          git push zpe main --force
