name: ZPE Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (deploy mode)
        run: npm run deploy

      - name: Commit & push built files
        run: |
          git config user.email "ci@zpe-deploy"
          git config user.name "ZPE CI"
          git add -f entry_v1_0_0.js images/ engine.json scenario.json style.css
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "build: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push origin main
