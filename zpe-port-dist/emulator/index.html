<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZPE Emulator – Kosmiczne Układy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0820;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: Arial;
}
#zpe-container {
  width: 1280px;
  height: 720px;
  position: relative;
  background: #000510;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,100,200,0.3);
}
</style>
</head>
<body>
<div id="zpe-container"></div>
<script>
// AMD stub – obsługuje define() z webpack AMD output (libraryTarget: "amd")
// entry.js wywołuje: define(factory) gdzie factory zwraca { default: engineFactory }
window.define = function(deps, factory) {
  var result;
  if (typeof deps === 'function') {
    result = deps(); // define(factory) — factory jest pierwszym arg
  } else if (typeof factory === 'function') {
    result = factory();
  }
  // result = { default: engineFactory } lub sam engineFactory
  var engineFactory = (result && typeof result.default === 'function') ? result.default : result;
  if (typeof engineFactory === 'function') {
    var engine = engineFactory();
    var container = document.getElementById('zpe-container');
    var api = {
      enginePath: function(assetName) {
        // Assets are served from /prev/RESOURCE-ID/pl/main/ (devServer static)
        return '/prev/RESOURCE-ID/pl/main/' + assetName;
      }
    };
    // Load savedata then start
    fetch('savedata.json')
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; })
      .then(function(stateData) {
        engine.init(container, api, {}).then(function() {
          engine.setState(stateData);
        });
      });
    window.addEventListener('beforeunload', function() {
      if (engine.destroy) engine.destroy(container);
    });
  }
};
window.define.amd = true;
</script>
<script src="/entry.js"></script>
</body>
</html>
